<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="560" viewBox="0 0 1040 560" role="img" aria-labelledby="title desc">
  <title id="title">whiskycolin AI progress integration screen</title>
  <desc id="desc">A diagram of the AI progress integration tab, showing local service status, copyable petctl commands, HTTP curl, recent events, and test progress.</desc>
  <rect width="1040" height="560" rx="28" fill="#f7f8fb"/>
  <rect x="28" y="28" width="984" height="504" rx="22" fill="#ffffff" stroke="#dfe4ec"/>
  <rect x="28" y="28" width="190" height="504" rx="22" fill="#fbfbfc"/>
  <line x1="218" y1="28" x2="218" y2="532" stroke="#e5e7eb"/>
  <text x="54" y="76" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="800" fill="#22252b">whiskycolin</text>
  <text x="54" y="103" font-family="Inter, Arial, sans-serif" font-size="14" fill="#8a8f98">配置宠物、词典和 AI 接入</text>
  <text x="76" y="165" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700" fill="#22252b">宠物管理</text>
  <text x="76" y="242" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700" fill="#22252b">词典学习</text>
  <rect x="46" y="294" width="150" height="54" rx="12" fill="#e9f6e6"/>
  <text x="76" y="318" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700" fill="#22252b">AI 进度接入</text>
  <text x="76" y="338" font-family="Inter, Arial, sans-serif" font-size="12" fill="#747b84">命令、HTTP、事件</text>

  <text x="250" y="82" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="850" fill="#202226">AI 进度接入</text>
  <text x="250" y="112" font-family="Inter, Arial, sans-serif" font-size="16" fill="#747b84">让 Codex、Claude Code、Cursor 通过本地命令或 HTTP 上报进度。</text>

  <rect x="250" y="142" width="728" height="84" rx="20" fill="#f9fbff" stroke="#dfe6f1"/>
  <circle cx="286" cy="184" r="10" fill="#54bb42"/>
  <text x="306" y="180" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800" fill="#22252b">本地服务运行中</text>
  <text x="306" y="204" font-family="Inter, Arial, sans-serif" font-size="14" fill="#747b84">127.0.0.1:4789 · 只监听本机回环地址</text>
  <rect x="790" y="164" width="150" height="40" rx="20" fill="#54bb42"/>
  <text x="826" y="190" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="800" fill="#ffffff">发送测试进度</text>

  <rect x="250" y="254" width="350" height="204" rx="20" fill="#ffffff" stroke="#dfe4ec"/>
  <text x="278" y="292" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="850" fill="#22252b">petctl 命令</text>
  <rect x="278" y="318" width="294" height="44" rx="10" fill="#f3f5f8"/>
  <text x="296" y="345" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#25282d">petctl progress --source codex</text>
  <rect x="278" y="374" width="294" height="44" rx="10" fill="#f3f5f8"/>
  <text x="296" y="401" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#25282d">petctl done --source codex</text>
  <text x="278" y="438" font-family="Inter, Arial, sans-serif" font-size="13" fill="#747b84">AI 进度优先覆盖词汇卡片，完成后自动隐藏。</text>

  <rect x="628" y="254" width="350" height="204" rx="20" fill="#ffffff" stroke="#dfe4ec"/>
  <text x="656" y="292" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="850" fill="#22252b">HTTP / 日志</text>
  <rect x="656" y="318" width="294" height="66" rx="10" fill="#f3f5f8"/>
  <text x="674" y="345" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#25282d">POST /v1/progress</text>
  <text x="674" y="367" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#25282d">GET  /v1/state</text>
  <rect x="656" y="402" width="294" height="30" rx="15" fill="#eaf2ff"/>
  <text x="682" y="422" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="750" fill="#2e7ccb">只读监听用户授权的状态日志</text>
</svg>
