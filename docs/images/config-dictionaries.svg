  <text x="76" y="242" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700" fill="#22252b">词典学习</text>
  <text x="76" y="262" font-family="Inter, Arial, sans-serif" font-size="12" fill="#747b84">导入和复习统计</text>
  <text x="76" y="318" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700" fill="#22252b">AI 进度接入</text>

  <text x="250" y="82" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="850" fill="#202226">词典学习</text>
  <text x="250" y="112" font-family="Inter, Arial, sans-serif" font-size="16" fill="#747b84">导入 CSV/JSON/PDF，按分类管理词典，并配置自动出词节奏。</text>

  <rect x="250" y="142" width="210" height="48" rx="24" fill="#54bb42"/>
