  <text x="704" y="172" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="750" fill="#33363b">CSV 模板</text>
  <rect x="828" y="142" width="150" height="48" rx="24" fill="#eceef1"/>
  <text x="868" y="172" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="750" fill="#33363b">导入格式</text>

  <text x="250" y="231" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800" fill="#24272c">分类</text>
  <rect x="304" y="209" width="72" height="34" rx="17" fill="#54bb42"/>
  <text x="328" y="231" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" fill="#ffffff">全部</text>
  <rect x="386" y="209" width="72" height="34" rx="17" fill="#eaf2ff"/>
