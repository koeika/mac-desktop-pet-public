  <rect x="364" y="362" width="78" height="44" rx="10" fill="#fff1e4"/>
  <text x="403" y="386" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="850" fill="#22252b">3</text>
  <text x="403" y="401" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="11" fill="#6e747c">待加强</text>
  <rect x="454" y="362" width="78" height="44" rx="10" fill="#f1f2f4"/>
  <text x="493" y="386" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="850" fill="#22252b">5</text>
  <text x="493" y="401" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="11" fill="#6e747c">跳过</text>

  <rect x="584" y="274" width="394" height="176" rx="20" fill="#f9fbff" stroke="#dfe6f1"/>
  <text x="608" y="312" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="850" fill="#22252b">学习节奏</text>
  <text x="608" y="344" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700" fill="#24272c">每天自动展示 10 词</text>
  <rect x="814" y="326" width="98" height="36" rx="18" fill="#f1f2f4"/>
  <text x="842" y="349" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="800" fill="#33363b">1-50</text>
  <text x="608" y="384" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700" fill="#24272c">学习窗口 6 小时</text>
  <text x="608" y="424" font-family="Inter, Arial, sans-serif" font-size="13" fill="#747b84">词汇题可持续展示直到点击反馈。</text>
