<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="560" viewBox="0 0 1040 560" role="img" aria-labelledby="title desc">
  <title id="title">whiskycolin dictionary learning configuration screen</title>
  <desc id="desc">A diagram of the dictionary learning tab, showing dictionary import, PDF import, category filters, learning pace, provider key status, and dictionary cards.</desc>
  <rect width="1040" height="560" rx="28" fill="#f7f8fb"/>
  <rect x="28" y="28" width="984" height="504" rx="22" fill="#ffffff" stroke="#dfe4ec"/>
  <rect x="28" y="28" width="190" height="504" rx="22" fill="#fbfbfc"/>
  <line x1="218" y1="28" x2="218" y2="532" stroke="#e5e7eb"/>
