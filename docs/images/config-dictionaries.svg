  <rect x="468" y="209" width="72" height="34" rx="17" fill="#e9f6e6"/>
  <text x="492" y="231" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" fill="#329327">日语</text>
  <rect x="550" y="209" width="90" height="34" rx="17" fill="#f1f2f4"/>
  <text x="574" y="231" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" fill="#6e747c">未分类</text>

  <rect x="250" y="274" width="310" height="176" rx="20" fill="#ffffff" stroke="#dfe4ec"/>
