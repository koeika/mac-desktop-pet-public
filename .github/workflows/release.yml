name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-macos:
    name: Build macOS release package
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build release binaries
        run: swift build -c release

      - name: Package Whisky&Cling
        run: |
          set -euo pipefail

          version="${GITHUB_REF_NAME}"
          app_version="${version#v}"
          dist_name="whiskycolin-${version}-macos-arm64"
          dist_dir="dist/${dist_name}"
          app_dir="${dist_dir}/Whisky&Cling.app"

          rm -rf dist
          mkdir -p "${app_dir}/Contents/MacOS"
          mkdir -p "${app_dir}/Contents/Resources"
          mkdir -p "${dist_dir}/bin"

          cp .build/release/whiskycolin "${app_dir}/Contents/MacOS/whiskycolin"
          cp .build/release/petctl "${dist_dir}/bin/petctl"
          cp -R .build/release/CodexDesktopPet_CodexPetApp.bundle "${app_dir}/Contents/Resources/CodexDesktopPet_CodexPetApp.bundle"
          cp Sources/CodexPetApp/Resources/AppIcon.icns "${app_dir}/Contents/Resources/AppIcon.icns"
          chmod +x "${app_dir}/Contents/MacOS/whiskycolin"
          chmod +x "${dist_dir}/bin/petctl"

          cat > "${app_dir}/Contents/Info.plist" <<'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleExecutable</key>
            <string>whiskycolin</string>
            <key>CFBundleIdentifier</key>
            <string>app.whiskycolin.desktop-pet</string>
            <key>CFBundleName</key>
            <string>Whisky&amp;Cling</string>
            <key>CFBundleDisplayName</key>
            <string>Whisky&amp;Cling</string>
            <key>CFBundleIconFile</key>
            <string>AppIcon</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>CFBundleShortVersionString</key>
            <string>${APP_VERSION}</string>
            <key>CFBundleVersion</key>
            <string>1</string>
            <key>LSMinimumSystemVersion</key>
            <string>14.0</string>
            <key>NSHighResolutionCapable</key>
            <true/>
          </dict>
          </plist>
          PLIST
          /usr/bin/sed -i '' "s/\${APP_VERSION}/${app_version}/g" "${app_dir}/Contents/Info.plist"

          codesign --force --deep --sign - "${app_dir}"
          codesign --verify --deep --strict --verbose=2 "${app_dir}"

          cp README.md LICENSE "${dist_dir}/"
          cp -R examples "${dist_dir}/examples"
          cp -R skills "${dist_dir}/skills"
          mkdir -p "${dist_dir}/Scripts"
          cp Scripts/install-codex-skill.sh "${dist_dir}/Scripts/install-codex-skill.sh"
          chmod +x "${dist_dir}/Scripts/install-codex-skill.sh"

          cat > "${dist_dir}/INSTALL.md" <<'INSTALL'
          # Whisky&Cling 安装说明

          ## 运行桌宠

          1. 解压 zip。
          2. 打开 `Whisky&Cling.app`。
          3. 如果 macOS 提示来自未认证开发者，请右键 `Whisky&Cling.app`，选择 `打开`。

          当前 release 未签名、未做 Developer ID 公证。

          ## 使用 petctl 上报 AI 进度

          ```bash
          ./bin/petctl progress --source codex --stage "实现功能" --message "正在修改文件" --progress 60
          ./bin/petctl done --source codex --stage "完成" --message "任务完成" --progress 100
          ```

          `petctl` 需要在 `Whisky&Cling.app` 运行时使用。

          ## 安装 Codex 自动上报 skill

          只打开 App 不会让 Codex 自动上报会话进度。需要安装随包附带的 Codex skill：

          ```bash
          ./Scripts/install-codex-skill.sh
          ```

          安装后重启 Codex 或开启新会话。Codex 会在读取代码、实现、验证、完成、失败等节点向桌宠上报；完成事件会覆盖当前单词卡并显示完成气泡。
          INSTALL

          ditto -c -k --sequesterRsrc --keepParent "${dist_dir}" "dist/${dist_name}.zip"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME}"
          asset="dist/whiskycolin-${version}-macos-arm64.zip"
          gh release create "${version}" "${asset}" \
            --title "Whisky&Cling ${version}" \
            --notes "macOS 14+ release package. Includes Whisky&Cling.app, petctl, Codex skill installer, README, install notes, and dictionary import templates. This build uses ad-hoc signing and is not notarized."
